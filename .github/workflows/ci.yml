name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: Verify conformance vectors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - name: Vectors are self-consistent with the reference
        run: python verify.py
      - name: Vectors are up to date (deterministic regeneration)
        run: |
          python generate.py
          git diff --exit-code vectors/ \
            || (echo "vectors are stale; run 'python generate.py'"; exit 1)

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - name: Install ruff
        run: pip install ruff==0.15.20
      - name: Run ruff
        run: ruff check .
